name: Auto-fix labeled issues

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to auto-fix'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: auto-fix-${{ github.event.inputs.issue_number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  fix:
    name: Fix eligible issue
    runs-on: ubuntu-latest

    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'auto-fix-candidate')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve issue number
        id: issue
        run: echo "number=${{ github.event.inputs.issue_number || github.event.issue.number }}" >> "$GITHUB_OUTPUT"

      - name: Auto-label scan issues
        if: "github.event_name != 'workflow_dispatch' && contains(github.event.issue.body, 'epocha-scan-fingerprint')"
        uses: actions/github-script@v7
        with:
          script: |
            const isSecurity = ${{ toJson(github.event.issue.labels) }}.some(l =>
              ['security', 'auth', 'needs-human'].includes(l.name)
            );
            if (!isSecurity && !${{ toJson(github.event.issue.labels) }}.some(l => l.name === 'auto-fix-candidate')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['auto-fix-candidate']
              });
            }

      - name: Detect security labels
        id: gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS=$(gh api repos/${{ github.repository }}/issues/${{ steps.issue.outputs.number }}/labels \
            --jq '[.[].name] | join(",")' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -Eq '(security|auth|needs-human)'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on skipped issue
        if: steps.gate.outputs.skip == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.issue.outputs.number }},
              body: 'Skipping auto-fix: the issue is labeled security/auth-sensitive and requires human review.'
            });

      - name: Run auto-fix agent
        if: steps.gate.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/auto-fix-issue.mjs "${{ steps.issue.outputs.number }}"

      - name: Check for changes
        if: steps.gate.outputs.skip != 'true'
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push fix
        if: steps.gate.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Auto-fix issue #${{ steps.issue.outputs.number }}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          git push

      - name: Comment and close fixed issue
        if: steps.gate.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${{ steps.commit.outputs.sha }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.issue.outputs.number }},
              body: `Auto-fix committed: ${commitUrl}`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.issue.outputs.number }},
              state: 'closed',
              state_reason: 'completed'
            });
