name: Build and Deploy — Epocha

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  AZURE_WEBAPP_NAME: app-timelineapp-dev
  AZURE_FUNC_NAME: func-timelineapp-dev

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run server tests
        working-directory: server
        run: npm test

      - name: Install client dependencies
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Run client tests
        working-directory: client
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      # ── Server ─────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build server (TypeScript → JS)
        working-directory: server
        run: npm run compile

      # ── Client ─────────────────────────────────────────────────────────
      - name: Install client dependencies
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Build client (Vite)
        working-directory: client
        run: npm run build

      # ── Package ────────────────────────────────────────────────────────
      - name: Assemble deployment artifact
        run: |
          mkdir -p deploy/client
          cp -r server/dist deploy/
          cp server/package.json deploy/
          cp server/package-lock.json deploy/
          cp -r client/dist deploy/client/
          # Include node_modules so the deploy is self-contained — no Oryx dependency
          cp -r server/node_modules deploy/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: epocha-app
          path: deploy/
          retention-days: 7

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request'
    concurrency:
      group: azure-app-service-deploy
      cancel-in-progress: false
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: epocha-app
          path: deploy/

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy/

  deploy-functions:
    name: Deploy Azure Functions
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        working-directory: functions
        run: npm ci

      - name: Build functions (TypeScript → JS)
        working-directory: functions
        run: npx tsc

      - name: Deploy to Azure Functions (run-from-package)
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

          # Build deployment zip (compiled JS + node_modules + host.json + package.json)
          cd functions
          zip -r ../functions.zip dist host.json package.json package-lock.json node_modules \
            -x "node_modules/.cache/*"
          cd ..

          # Upload to blob storage and update WEBSITE_RUN_FROM_PACKAGE
          STORAGE_ACCOUNT="sttimelineappdev"
          CONTAINER="function-releases"
          BLOB_NAME="functions-$(date +%Y%m%d%H%M%S)-${{ github.sha }}.zip"
          EXPIRY=$(date -u -d "+10 years" '+%Y-%m-%dT%H:%MZ')

          az storage blob upload \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "${{ secrets.AZURE_STORAGE_KEY }}" \
            --container-name "$CONTAINER" \
            --name "$BLOB_NAME" \
            --file functions.zip \
            --overwrite

          SAS=$(az storage blob generate-sas \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "${{ secrets.AZURE_STORAGE_KEY }}" \
            --container-name "$CONTAINER" \
            --name "$BLOB_NAME" \
            --permissions r \
            --expiry "$EXPIRY" \
            --output tsv)

          PACKAGE_URL="https://${STORAGE_ACCOUNT}.blob.core.windows.net/${CONTAINER}/${BLOB_NAME}?${SAS}"

          az functionapp config appsettings set \
            --resource-group rg-epocha-dev \
            --name ${{ env.AZURE_FUNC_NAME }} \
            --settings "WEBSITE_RUN_FROM_PACKAGE=${PACKAGE_URL}" \
            --output none

          az functionapp restart \
            --resource-group rg-epocha-dev \
            --name ${{ env.AZURE_FUNC_NAME }}

  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    needs: deploy
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request'
    outputs:
      should_rollback: ${{ steps.threshold.outputs.should_rollback }}
      failed: ${{ steps.threshold.outputs.failed }}
      total: ${{ steps.threshold.outputs.total }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tests/smoke/package.json

      - name: Install smoke test dependencies
        working-directory: tests/smoke
        run: npm install

      - name: Wait for app to be ready (JSON health check)
        run: |
          for i in $(seq 1 24); do
            BODY=$(curl -s https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health)
            if echo "$BODY" | grep -q '"ok":true'; then
              echo "App is ready: $BODY"
              break
            fi
            echo "Attempt $i: not ready yet (got: $BODY) — waiting 10s"
            sleep 10
          done

      - name: Run smoke tests (continue on failure to capture results)
        id: run_smoke
        continue-on-error: true
        working-directory: tests/smoke
        env:
          SMOKE_BASE_URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net
        run: npm test

      - name: Evaluate failure threshold (rollback if ≥20% fail)
        id: threshold
        working-directory: tests/smoke
        run: |
          if [ ! -f results.json ]; then
            echo "results.json not found — treating as total failure"
            echo "should_rollback=true" >> $GITHUB_OUTPUT
            echo "failed=unknown" >> $GITHUB_OUTPUT
            echo "total=unknown" >> $GITHUB_OUTPUT
            exit 0
          fi

          TOTAL=$(jq '.numTotalTests // 0' results.json)
          FAILED=$(jq '.numFailedTests // 0' results.json)
          echo "Smoke results: $FAILED failed out of $TOTAL total"
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

          if [ "$TOTAL" -eq 0 ]; then
            echo "No tests ran — treating as total failure"
            echo "should_rollback=true" >> $GITHUB_OUTPUT
          elif [ "$(echo "$FAILED * 100 / $TOTAL >= 20" | bc)" -eq 1 ]; then
            echo "Failure rate $(( FAILED * 100 / TOTAL ))% ≥ 20% threshold — ROLLBACK"
            echo "should_rollback=true" >> $GITHUB_OUTPUT
          else
            echo "Failure rate $(( FAILED * 100 / TOTAL ))% < 20% threshold — OK"
            echo "should_rollback=false" >> $GITHUB_OUTPUT
          fi

  # ── Mark this run as last-known-good after smoke passes ──────────────────

  mark-stable:
    name: Mark stable build
    runs-on: ubuntu-latest
    needs: smoke
    if: needs.smoke.outputs.should_rollback == 'false'
    steps:
      - name: Store stable run ID in Azure Blob Storage
        env:
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          # Ensure container exists (idempotent — safe to run even if it already exists)
          az storage container create \
            --account-name "sttimelineappdev" \
            --account-key "$AZURE_STORAGE_KEY" \
            --name "app-releases" \
            --public-access off 2>/dev/null || true

          echo '${{ github.run_id }}' > stable-run-id.txt
          az storage blob upload \
            --account-name "sttimelineappdev" \
            --account-key "$AZURE_STORAGE_KEY" \
            --container-name "app-releases" \
            --name "stable/stable-run-id.txt" \
            --file stable-run-id.txt \
            --overwrite
          echo "Marked run ${{ github.run_id }} (sha ${{ github.sha }}) as stable"

  # ── Rollback to last-known-good if smoke threshold exceeded ──────────────

  rollback:
    name: Rollback to last stable build
    runs-on: ubuntu-latest
    needs: smoke
    if: needs.smoke.outputs.should_rollback == 'true'
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - name: Fetch last stable run ID from Azure Blob Storage
        id: fetch_stable
        env:
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          az storage blob download \
            --account-name "sttimelineappdev" \
            --account-key "$AZURE_STORAGE_KEY" \
            --container-name "app-releases" \
            --name "stable/stable-run-id.txt" \
            --file stable-run-id.txt 2>/dev/null || echo "no-stable" > stable-run-id.txt
          STABLE_RUN=$(cat stable-run-id.txt | tr -d '[:space:]')
          echo "stable_run=$STABLE_RUN" >> $GITHUB_OUTPUT
          echo "Last stable run: $STABLE_RUN"

      - name: Download last stable artifact
        if: steps.fetch_stable.outputs.stable_run != 'no-stable'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ steps.fetch_stable.outputs.stable_run }} \
            -n epocha-app \
            -D rollback-deploy/ \
            --repo ${{ github.repository }}

      - name: Deploy last stable build to Azure App Service
        if: steps.fetch_stable.outputs.stable_run != 'no-stable'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: rollback-deploy/

      - name: Create GitHub issue documenting the rollback
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FAILED="${{ needs.smoke.outputs.failed }}"
          TOTAL="${{ needs.smoke.outputs.total }}"
          STABLE="${{ steps.fetch_stable.outputs.stable_run }}"
          RATE="$([[ "$TOTAL" != "0" && "$TOTAL" != "unknown" ]] && echo "$(( ${FAILED:-0} * 100 / ${TOTAL:-1} ))%" || echo "unknown")"

          gh issue create \
            --title "Auto-rollback: smoke tests failed on ${{ github.sha }}" \
            --label "bug" \
            --body "## Automatic Rollback

          Smoke tests exceeded the 20% failure threshold on commit \`${{ github.sha }}\`.

          | | Value |
          |---|---|
          | Failed tests | $FAILED / $TOTAL ($RATE failure rate) |
          | Trigger commit | [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
          | Failed run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          | Rolled back to run | $STABLE |

          **Action required:** Investigate the failing smoke tests in the run above, fix the regression, and push a new commit." \
            --repo ${{ github.repository }}
