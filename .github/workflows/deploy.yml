name: Build and Deploy — Epocha

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  AZURE_WEBAPP_NAME: app-timelineapp-dev
  AZURE_FUNC_NAME: func-timelineapp-dev

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Server ─────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build server (TypeScript → JS)
        working-directory: server
        run: npm run compile

      # ── Client ─────────────────────────────────────────────────────────
      - name: Install client dependencies
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Build client (Vite)
        working-directory: client
        run: npm run build

      # ── Package ────────────────────────────────────────────────────────
      - name: Assemble deployment artifact
        run: |
          mkdir -p deploy/client
          cp -r server/dist deploy/
          cp server/package.json deploy/
          cp server/package-lock.json deploy/
          cp -r client/dist deploy/client/
          # No node_modules — Azure Oryx installs them on Linux at deploy time
          # (SCM_DO_BUILD_DURING_DEPLOYMENT=true + ORYX_DISABLE_TYPESCRIPT_BUILD=true)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: epocha-app
          path: deploy/
          retention-days: 1

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request'
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: epocha-app
          path: deploy/

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy/

  deploy-functions:
    name: Deploy Azure Functions
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        working-directory: functions
        run: npm ci

      - name: Build functions (TypeScript → JS)
        working-directory: functions
        run: npx tsc

      - name: Deploy to Azure Functions (run-from-package)
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

          # Build deployment zip (compiled JS + node_modules + host.json + package.json)
          cd functions
          zip -r ../functions.zip dist host.json package.json package-lock.json node_modules \
            -x "node_modules/.cache/*"
          cd ..

          # Upload to blob storage and update WEBSITE_RUN_FROM_PACKAGE
          STORAGE_ACCOUNT="sttimelineappdev"
          CONTAINER="function-releases"
          BLOB_NAME="functions-$(date +%Y%m%d%H%M%S)-${{ github.sha }}.zip"
          EXPIRY=$(date -u -d "+10 years" '+%Y-%m-%dT%H:%MZ')

          az storage blob upload \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "${{ secrets.AZURE_STORAGE_KEY }}" \
            --container-name "$CONTAINER" \
            --name "$BLOB_NAME" \
            --file functions.zip \
            --overwrite

          SAS=$(az storage blob generate-sas \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "${{ secrets.AZURE_STORAGE_KEY }}" \
            --container-name "$CONTAINER" \
            --name "$BLOB_NAME" \
            --permissions r \
            --expiry "$EXPIRY" \
            --output tsv)

          PACKAGE_URL="https://${STORAGE_ACCOUNT}.blob.core.windows.net/${CONTAINER}/${BLOB_NAME}?${SAS}"

          az functionapp config appsettings set \
            --resource-group rg-epocha-dev \
            --name ${{ env.AZURE_FUNC_NAME }} \
            --settings "WEBSITE_RUN_FROM_PACKAGE=${PACKAGE_URL}" \
            --output none

          az functionapp restart \
            --resource-group rg-epocha-dev \
            --name ${{ env.AZURE_FUNC_NAME }}
