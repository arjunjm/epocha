name: Adversarial QA Scan

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: adversarial-qa-scan
  cancel-in-progress: false

jobs:
  scan:
    name: Scan repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run adversarial scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/adversarial-scan.mjs
